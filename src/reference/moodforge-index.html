<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoodForge — Emotional Music Map</title>
<style>
/* ===== RESET + VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0f14;
  --surface: #161922;
  --surface2: #1e2130;
  --border: rgba(255,255,255,0.07);
  --accent: #6c63ff;
  --accent2: #00d4aa;
  --text: #e2e4f0;
  --text-dim: #8b8fa8;
  --text-muted: #565a72;
  --player-h: 68px;
  --header-h: 52px;
  --panel-w: 320px;
  --details-w: 420px;
  --radius: 10px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
header {
  height: var(--header-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 10;
}
.logo { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; display: flex; align-items: center; gap: 6px; }
.logo-accent { color: var(--accent); }
.now-playing-bar { flex: 1; display: flex; align-items: center; gap: 8px; min-width: 0; }
.playing-dot {
  width: 7px; height: 7px; border-radius: 50%; background: var(--accent2);
  flex-shrink: 0; display: none;
  animation: pulse-dot 1.4s ease-in-out infinite;
}
.playing-dot.active { display: block; }
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.35;transform:scale(.65)} }
.now-playing-title { font-size: 13px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.header-btns { display: flex; gap: 8px; align-items: center; }
.btn {
  background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim);
  padding: 6px 13px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 500;
  transition: all .15s; white-space: nowrap; user-select: none;
}
.btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.08); }
.btn.active { border-color: var(--accent); color: var(--accent); background: rgba(108,99,255,.15); }
.playlist-count-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--accent); color: #fff; font-size: 10px; font-weight: 700;
  border-radius: 10px; padding: 1px 6px; margin-left: 4px; min-width: 18px;
  display: none;
}
.playlist-count-badge.visible { display: inline-flex; }

/* ===== APP LAYOUT ===== */
.app { flex: 1; display: flex; min-height: 0; overflow: hidden; }

/* ===== MAP SECTION ===== */
.map-section { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.map-wrapper { flex: 1; position: relative; overflow: hidden; }
#mapCanvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
  cursor: grab; touch-action: none;
}

/* ===== PLAYLIST PANEL ===== */
.playlist-panel {
  width: 0; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border);
  overflow: hidden; transition: width var(--transition); display: flex; flex-direction: column;
}
.playlist-panel.open { width: var(--panel-w); }
.playlist-head {
  padding: 12px 14px 10px; border-bottom: 1px solid var(--border);
  flex-shrink: 0; display: flex; align-items: center; gap: 8px;
}
.playlist-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .8px; color: var(--accent); flex: 1;
}
.playlist-track-count { font-size: 10px; color: var(--text-muted); }
.download-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 500;
  transition: all .15s; white-space: nowrap; display: flex; align-items: center; gap: 5px;
}
.download-btn:hover:not(:disabled) { border-color: var(--accent2); color: var(--accent2); background: rgba(0,212,170,.08); }
.download-btn:disabled { opacity: 0.35; cursor: default; }
.playlist-scroll { flex: 1; overflow-y: auto; }
.playlist-scroll::-webkit-scrollbar { width: 3px; }
.playlist-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.playlist-empty {
  text-align: center; color: var(--text-muted); font-size: 12px;
  padding: 40px 20px; line-height: 1.8;
}
.playlist-item {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.playlist-item:hover { background: rgba(255,255,255,.03); }
.playlist-item.is-playing { background: rgba(108,99,255,.07); }
.pi-num {
  font-size: 10px; font-family: monospace; color: var(--text-muted);
  width: 18px; text-align: right; flex-shrink: 0;
}
.pi-info { flex: 1; min-width: 0; }
.pi-name {
  font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.pi-meta {
  font-size: 10px; color: var(--text-muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
}
.pi-play {
  background: transparent; border: 1px solid var(--border); color: var(--text-dim);
  width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-size: 9px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .15s;
}
.pi-play:hover { border-color: var(--accent); color: var(--accent); }
.pi-remove {
  background: transparent; border: none; color: var(--text-muted);
  width: 20px; height: 20px; border-radius: 4px; cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .15s; line-height: 1;
}
.pi-remove:hover { background: rgba(255,80,80,.15); color: #ff5050; }

/* ===== DETAILS PANEL ===== */
.details-panel {
  width: 0; flex-shrink: 0; background: var(--surface); border-left: 1px solid var(--border);
  overflow: hidden; transition: width var(--transition); display: flex; flex-direction: column;
}
.details-panel.open { width: var(--details-w); }
.details-head { padding: 14px 18px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.details-track-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
.details-track-meta { font-size: 11px; color: var(--text-dim); }
.details-scroll { flex: 1; overflow-y: auto; padding: 14px; }
.details-scroll::-webkit-scrollbar { width: 3px; }
.details-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.details-empty { text-align: center; color: var(--text-muted); font-size: 12px; padding: 40px 20px; line-height: 1.7; }

/* ===== SECTION CARDS ===== */
.section-card { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.section-head { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; user-select: none; transition: background .12s; }
.section-head:hover { background: rgba(255,255,255,.025); }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--accent); }
.section-chevron { font-size: 11px; color: var(--text-muted); transition: transform .2s; }
.section-chevron.open { transform: rotate(90deg); }
.section-body { padding: 0 14px 10px; display: none; }
.section-body.open { display: block; }

/* ===== FEATURE ROWS ===== */
.feat-row {
  display: flex; align-items: center; gap: 10px; padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,.035); position: relative;
}
.feat-row:last-child { border-bottom: none; }
.feat-label { font-size: 11px; color: var(--text-dim); flex-shrink: 0; width: 130px; cursor: help; }
.feat-bar { flex: 1; height: 3px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
.feat-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width .5s; }
.feat-value { font-size: 11px; font-weight: 600; font-family: monospace; color: var(--text); text-align: right; white-space: nowrap; flex-shrink: 0; min-width: 52px; }
.tip {
  position: absolute; bottom: calc(100% + 6px); left: 0;
  background: var(--bg); border: 1px solid rgba(255,255,255,.12);
  border-radius: 7px; padding: 7px 10px; font-size: 11px; color: var(--text-dim);
  line-height: 1.5; max-width: 260px; z-index: 200; pointer-events: none;
  opacity: 0; transition: opacity .18s; white-space: normal;
  box-shadow: 0 6px 20px rgba(0,0,0,.6);
}
.feat-row:hover .tip { opacity: 1; }

/* ===== EMOTION BARS ===== */
.emo-bars { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
.emo-bar-row { display: flex; align-items: center; gap: 7px; }
.emo-name { font-size: 10px; color: var(--text-dim); width: 110px; flex-shrink: 0; }
.emo-track { flex: 1; height: 4px; background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden; }
.emo-fill { height: 100%; border-radius: 2px; transition: width .5s; }
.emo-val { font-size: 10px; font-family: monospace; color: var(--text-muted); width: 34px; text-align: right; flex-shrink: 0; }
.sub-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin: 10px 0 4px; }

/* ===== PLAYER ===== */
.player {
  height: var(--player-h); background: var(--surface); border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 14px; flex-shrink: 0; z-index: 10;
}
.play-btn {
  width: 38px; height: 38px; border-radius: 50%; background: var(--accent);
  border: none; color: #fff; font-size: 14px; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.play-btn:hover { background: #7d76ff; transform: scale(1.05); }
.play-btn:disabled { background: var(--surface2); cursor: default; transform: none; }
.add-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: transparent; border: 1.5px solid var(--border);
  color: var(--text-muted); font-size: 18px; line-height: 1;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; font-weight: 300;
}
.add-btn:hover:not(:disabled) {
  border-color: var(--accent2); color: var(--accent2);
  background: rgba(0,212,170,.10); transform: scale(1.1);
}
.add-btn:disabled { opacity: 0.3; cursor: default; }
.add-btn.added { border-color: var(--accent2); color: var(--accent2); background: rgba(0,212,170,.12); }
.player-info { flex: 0 0 180px; min-width: 0; }
.player-title { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-meta { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.player-progress { flex: 1; display: flex; align-items: center; gap: 10px; }
.progress-track { flex: 1; height: 4px; background: rgba(255,255,255,.08); border-radius: 2px; cursor: pointer; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; pointer-events: none; transition: width .1s linear; }
.time-display { font-size: 10px; font-family: monospace; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }

/* ===== SWATCH ===== */
.swatch-row { display: flex; align-items: center; margin: 6px 0 10px; gap: 10px; }
.color-swatch { width: 44px; height: 44px; border-radius: 8px; border: 1px solid var(--border); flex-shrink: 0; }
.swatch-info { font-size: 11px; color: var(--text-dim); }

/* ===== GENERATE BUTTON ===== */
.generate-btn { background: linear-gradient(135deg, rgba(108,99,255,.18), rgba(0,212,170,.12)); border-color: var(--accent); color: var(--accent); }
.generate-btn:hover:not(:disabled) { background: linear-gradient(135deg, rgba(108,99,255,.28), rgba(0,212,170,.18)); color: #fff; }
.generate-btn:disabled { opacity: 0.35; cursor: default; }

/* ===== GENERATE OVERLAY ===== */
.gen-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.6); backdrop-filter: blur(6px);
  display: none; align-items: center; justify-content: center;
}
.gen-overlay.open { display: flex; }
.gen-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; width: 480px; max-width: 90vw;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  overflow: hidden;
}
.gen-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.gen-title { font-weight: 700; font-size: 14px; color: var(--accent); }
.gen-ref { flex: 1; font-size: 11px; color: var(--text-muted); text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gen-close {
  background: transparent; border: none; color: var(--text-muted);
  font-size: 18px; cursor: pointer; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px; transition: all .12s;
}
.gen-close:hover { background: rgba(255,255,255,.06); color: var(--text); }
.gen-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 12px; }
.gen-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); }
.gen-prompt {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: inherit; font-size: 13px;
  padding: 10px 12px; resize: vertical; outline: none;
  transition: border-color .15s;
}
.gen-prompt:focus { border-color: var(--accent); }
.gen-options { display: flex; flex-direction: column; gap: 8px; }
.gen-row { display: flex; align-items: center; gap: 10px; }
.gen-slider {
  flex: 1; -webkit-appearance: none; height: 4px;
  background: rgba(255,255,255,.08); border-radius: 2px; outline: none;
}
.gen-slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  background: var(--accent); border-radius: 50%; cursor: pointer;
}
.gen-dur-val { font-size: 12px; font-family: monospace; color: var(--text-dim); min-width: 36px; }
.gen-check-label { font-size: 12px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; cursor: pointer; }
.gen-check-label input { accent-color: var(--accent); }
.gen-submit {
  background: var(--accent); border: none; color: #fff;
  padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; align-self: stretch;
}
.gen-submit:hover:not(:disabled) { background: #7d76ff; }
.gen-submit:disabled { opacity: 0.5; cursor: wait; }
.gen-status {
  font-size: 12px; color: var(--text-muted); text-align: center;
  min-height: 18px;
}
.gen-status.error { color: #ff5050; }
.gen-status.success { color: var(--accent2); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">🎵 <span class="logo-accent">MoodForge</span></div>
  <div class="now-playing-bar">
    <div class="playing-dot" id="playingDot"></div>
    <div class="now-playing-title" id="nowPlayingTitle">Drag any dimension to find matching music</div>
  </div>
  <div class="header-btns">
    <span id="trackCountLabel" style="font-size:11px;color:var(--text-muted);padding-right:4px"></span>
    <div style="display:flex;gap:2px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:2px">
      <button class="btn active" id="modeGems" style="border:none;border-radius:5px;padding:5px 10px">GEMS 9</button>
      <button class="btn" id="modeCowen" style="border:none;border-radius:5px;padding:5px 10px">COWEN 13</button>
    </div>
    <button class="btn" id="detailsBtn">⊞ Details</button>
    <button class="btn generate-btn" id="generateBtn" disabled>✦ Prompt</button>
  </div>
</header>

<!-- APP -->
<div class="app">
  <div class="map-section">
    <div class="map-wrapper">
      <canvas id="mapCanvas"></canvas>
    </div>
  </div>

  <!-- DETAILS PANEL -->
  <div class="details-panel" id="detailsPanel">
    <div class="details-head">
      <div class="details-track-name" id="detailsName">Select a track</div>
      <div class="details-track-meta" id="detailsMeta"></div>
    </div>
    <div class="details-scroll" id="detailsScroll">
      <div class="details-empty">Drag a dimension dot to find<br>a matching track</div>
    </div>
  </div>
</div>

<!-- PLAYER -->
<div class="player">
  <button class="play-btn" id="playBtn" disabled>▶</button>
  <div class="player-info">
    <div class="player-title" id="playerTitle">No track selected</div>
    <div class="player-meta" id="playerMeta">Drop a pin to play</div>
  </div>
  <div class="player-progress">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <span class="time-display" id="timeDisplay">0:00 / 0:30</span>
  </div>
</div>

<!-- PROMPT OVERLAY -->
<div class="gen-overlay" id="genOverlay">
  <div class="gen-panel">
    <div class="gen-header">
      <span class="gen-title">✦ Music Prompt</span>
      <span class="gen-ref" id="genRefLabel">Reference: none</span>
      <button class="gen-close" id="genClose">×</button>
    </div>
    <div class="gen-body">
      <label class="gen-label">Prompt — edit or copy to your music generation tool</label>
      <textarea class="gen-prompt" id="genPrompt" rows="6" placeholder="Select a track to generate a prompt…"></textarea>
      <button class="gen-submit" id="genSubmit">Copy to Clipboard</button>
      <div class="gen-status" id="genStatus"></div>
    </div>
  </div>
</div>

<script>
/* ===== CONFIG ===== */
const GEMS_KEYS  = ['wonder','transcendence','tenderness','nostalgia','peacefulness','joyful_activation','power','tension','gems_sadness'];
const GEMS_LABEL = {wonder:'Wonder',transcendence:'Transcendence',tenderness:'Tenderness',nostalgia:'Nostalgia',peacefulness:'Peacefulness',joyful_activation:'Joyful Act.',power:'Power',tension:'Tension',gems_sadness:'Sadness'};
const MOOD_COLOR = {'happy-energetic':'#FFD166','calm-positive':'#00D4AA','sad-quiet':'#7B8EF5','tense-agitated':'#FF6B6B'};
const COWEN_KEYS  = ['amusement','joy','eroticism','beauty','relaxation','sadness','dreaminess','triumph','anxiety','scariness','annoyance','defiance','pumped_up'];
const COWEN_CLR   = {amusement:'#FFD166',joy:'#06D6A0',eroticism:'#EF476F',beauty:'#9D4EDD',relaxation:'#00D4AA',sadness:'#7B8EF5',dreaminess:'#90CAF9',triumph:'#FFB347',anxiety:'#FF8C42',scariness:'#C0392B',annoyance:'#E67E22',defiance:'#E74C3C',pumped_up:'#F1C40F'};
const COWEN_LABEL = {amusement:'Amusement',joy:'Joy',eroticism:'Eroticism',beauty:'Beauty',relaxation:'Relaxation',sadness:'Sadness',dreaminess:'Dreaminess',triumph:'Triumph',anxiety:'Anxiety',scariness:'Scariness',annoyance:'Annoyance',defiance:'Defiance',pumped_up:'Pumped Up'};
const PAD = 56;
const N = GEMS_KEYS.length;

/* ===== STATE ===== */
let mapData = null;
let radarMode = 'gems';  // 'gems' | 'cowen'
let cursorValues = Object.fromEntries([...GEMS_KEYS, ...COWEN_KEYS].map(k => [k, 0.5]));
let gemsMin = {}, gemsMax = {};   // per-dimension data range
let gemsSorted = {};              // per-dimension sorted values for ECDF percentile ranking
let draggingSpoke = -1;

function activeKeys()   { return radarMode === 'gems' ? GEMS_KEYS  : COWEN_KEYS; }
function activeLabels() { return radarMode === 'gems' ? GEMS_LABEL : COWEN_LABEL; }
function activeColors() { return radarMode === 'gems' ? GEMS_COLORS : COWEN_CLR; }
let selectedTrack = null;
let detailsOpen = false;
let _playDebounce = null;
const audio = new Audio();

/* ===== CANVAS ===== */
const canvas = document.getElementById('mapCanvas');
let ctx;
const lw = () => canvas.offsetWidth;
const lh = () => canvas.offsetHeight;

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width  = lw() * dpr;
  canvas.height = lh() * dpr;
  ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  render();
}

function radarRadius() {
  return Math.min(lw() - PAD * 2, lh() - PAD * 2) * 0.46;
}
function getAngles() {
  const keys = activeKeys();
  return keys.map((_, i) => (i / keys.length) * Math.PI * 2 - Math.PI / 2);
}

/* ===== RENDER ===== */
function render() {
  if (!ctx) return;
  const W = lw(), H = lh();
  ctx.clearRect(0, 0, W, H);
  const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  grad.addColorStop(0, '#141720');
  grad.addColorStop(1, '#0d0f14');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  drawRadarBackdrop();
  drawGemsProfile();
  drawSpokeDots();
}

/* ===== RADAR BACKDROP ===== */
function drawRadarBackdrop() {
  const W = lw(), H = lh();
  const cx = W / 2, cy = H / 2;
  const maxR = Math.min(W - PAD * 2, H - PAD * 2) * 0.46;
  const keys = activeKeys();
  const labels = activeLabels();
  const nk = keys.length;
  const rings = 5;
  const angles = keys.map((_, i) => (i / nk) * Math.PI * 2 - Math.PI / 2);

  for (let r = 1; r <= rings; r++) {
    const radius = maxR * r / rings;
    ctx.beginPath();
    angles.forEach((a, i) => {
      const x = cx + Math.cos(a) * radius, y = cy + Math.sin(a) * radius;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.closePath();
    ctx.strokeStyle = `rgba(108,99,255,${0.04 + r * 0.015})`;
    ctx.lineWidth = 1; ctx.setLineDash([]); ctx.stroke();
  }

  ctx.lineWidth = 1;
  angles.forEach(a => {
    ctx.strokeStyle = 'rgba(108,99,255,0.09)';
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + Math.cos(a) * maxR, cy + Math.sin(a) * maxR);
    ctx.stroke();
  });

  const labelR = maxR + 18;
  ctx.font = '10px -apple-system, BlinkMacSystemFont, system-ui';
  ctx.fillStyle = 'rgba(108,99,255,0.38)';
  angles.forEach((a, i) => {
    const lx = cx + Math.cos(a) * labelR, ly = cy + Math.sin(a) * labelR;
    const cosA = Math.cos(a), sinA = Math.sin(a);
    ctx.textAlign    = Math.abs(cosA) < 0.2 ? 'center' : cosA > 0 ? 'left' : 'right';
    ctx.textBaseline = Math.abs(sinA) < 0.2 ? 'middle' : sinA > 0 ? 'top' : 'bottom';
    ctx.fillText(labels[keys[i]] || keys[i], lx, ly);
  });

  ctx.font = 'bold 9px -apple-system, BlinkMacSystemFont, system-ui';
  ctx.fillStyle = 'rgba(108,99,255,0.22)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillText(radarMode === 'gems' ? 'GEMS 9 DIMENSIONS' : 'COWEN 13 EMOTIONS', PAD + 2, PAD + 2);
}

/* ===== GEMS PROFILE DRAWING ===== */
function drawGemsProfile() {
  const W = lw(), H = lh();
  const cx = W / 2, cy = H / 2;
  const maxR = radarRadius();
  const angles = getAngles();
  const keys = activeKeys();

  // Filled polygon for current cursorValues
  ctx.beginPath();
  angles.forEach((a, i) => {
    const val = cursorValues[keys[i]] || 0;
    const r = val * maxR;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
  grad.addColorStop(0, 'rgba(108,99,255,0.30)');
  grad.addColorStop(1, 'rgba(108,99,255,0.06)');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(108,99,255,0.55)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  ctx.stroke();
}

function drawSpokeDots() {
  const W = lw(), H = lh();
  const cx = W / 2, cy = H / 2;
  const maxR = radarRadius();
  const angles = getAngles();
  const keys = activeKeys();
  const colors = activeColors();

  keys.forEach((key, i) => {
    const a = angles[i];
    const val = cursorValues[key] || 0;
    const r = val * maxR;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    const color = colors[key] || '#6c63ff';
    const active = draggingSpoke === i;

    // Glow
    if (active) { ctx.shadowColor = color; ctx.shadowBlur = 28; }

    // Outer glow ring
    ctx.beginPath();
    ctx.arc(x, y, active ? 12 : 9, 0, Math.PI * 2);
    ctx.fillStyle = color + (active ? '40' : '20');
    ctx.fill();

    // Main dot
    ctx.beginPath();
    ctx.arc(x, y, active ? 8 : 6, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();

    // Inner highlight
    ctx.beginPath();
    ctx.arc(x - 1.5, y - 1.5, active ? 3 : 2.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fill();

    ctx.shadowBlur = 0;
  });
}

/* ===== GEMS CURSOR INTERACTION ===== */
function getSpokeForXY(mx, my) {
  const cx = lw() / 2, cy = lh() / 2;
  const maxR = radarRadius();
  const angles = getAngles();
  const keys = activeKeys();

  // First check proximity to existing dot positions (within 20px)
  for (let i = 0; i < keys.length; i++) {
    const a = angles[i];
    const val = cursorValues[keys[i]] || 0;
    const r = val * maxR;
    const dx = cx + Math.cos(a) * r - mx;
    const dy = cy + Math.sin(a) * r - my;
    if (Math.hypot(dx, dy) < 20) return i;
  }

  // Otherwise find nearest spoke by angle
  const mouseAngle = Math.atan2(my - cy, mx - cx);
  let best = 0, bestDiff = Infinity;
  angles.forEach((a, i) => {
    let diff = Math.abs(mouseAngle - a);
    if (diff > Math.PI) diff = Math.PI * 2 - diff;
    if (diff < bestDiff) { bestDiff = diff; best = i; }
  });
  return best;
}

function getValueForXY(spokeIdx, mx, my) {
  const cx = lw() / 2, cy = lh() / 2;
  const maxR = radarRadius();
  const a = getAngles()[spokeIdx];
  const proj = (mx - cx) * Math.cos(a) + (my - cy) * Math.sin(a);
  return Math.max(0, Math.min(1, proj / maxR));
}

function ecdfRank(k, v) {
  // Return percentile rank of v in sorted array for dimension k (0=min, 1=max)
  const arr = gemsSorted[k];
  if (!arr || arr.length === 0) return 0.5;
  let lo = 0, hi = arr.length - 1;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (arr[mid] < v) lo = mid + 1; else hi = mid;
  }
  return lo / (arr.length - 1);
}

function findNearest() {
  if (!mapData || !mapData.tracks || mapData.tracks.length === 0) return null;
  const keys = activeKeys();
  let best = null, bestDist = Infinity;
  mapData.tracks.forEach(t => {
    let dist = 0;
    keys.forEach(k => {
      // Use percentile rank so cursor 0.5 = median track, 1.0 = highest track
      const tRank = ecdfRank(k, t[k] || 0);
      const d = tRank - (cursorValues[k] || 0);
      dist += d * d;
    });
    if (dist < bestDist) { bestDist = dist; best = t; }
  });
  return best;
}

function schedulePlay(ms) {
  clearTimeout(_playDebounce);
  _playDebounce = setTimeout(() => {
    const nearest = findNearest();
    if (nearest) playTrack(nearest);
  }, ms);
}

/* ===== POINTER EVENTS ===== */
function cXY(e) { const r = canvas.getBoundingClientRect(); return [e.clientX-r.left, e.clientY-r.top]; }

canvas.addEventListener('pointerdown', e => {
  const [mx, my] = cXY(e);
  const cx = lw() / 2, cy = lh() / 2;
  if (Math.hypot(mx - cx, my - cy) > radarRadius() + 24) return;
  draggingSpoke = getSpokeForXY(mx, my);
  canvas.setPointerCapture(e.pointerId);
  canvas.style.cursor = 'grabbing';
  cursorValues[activeKeys()[draggingSpoke]] = getValueForXY(draggingSpoke, mx, my);
  render();
  schedulePlay(300);
});

canvas.addEventListener('pointermove', e => {
  if (draggingSpoke < 0) return;
  const [mx, my] = cXY(e);
  cursorValues[activeKeys()[draggingSpoke]] = getValueForXY(draggingSpoke, mx, my);
  render();
  schedulePlay(300);
});

canvas.addEventListener('pointerup', e => {
  if (draggingSpoke < 0) return;
  const [mx, my] = cXY(e);
  cursorValues[activeKeys()[draggingSpoke]] = getValueForXY(draggingSpoke, mx, my);
  draggingSpoke = -1;
  canvas.style.cursor = 'default';
  render();
  schedulePlay(0);
});

canvas.addEventListener('pointercancel', () => {
  draggingSpoke = -1;
  canvas.style.cursor = 'default';
});

/* ===== PROMPT BUILDER ===== */
function buildTrackPrompt(track) {
  if (!track) return '';
  const name = track.title || track.filename || `Track ${track.id}`;
  const parts = [];

  // GEMS emotional profile
  const dims = GEMS_KEYS.map(k => ({key: k, name: GEMS_LABEL[k], val: track[k] || 0}))
    .sort((a, b) => b.val - a.val);
  const high = dims.filter(d => d.val > 0.65);
  const low  = dims.filter(d => d.val < 0.35);
  const mid  = dims.filter(d => d.val >= 0.35 && d.val <= 0.65);

  if (high.length) parts.push(`Strong emotional presence of ${high.map(d => d.name.toLowerCase()).join(', ')}.`);
  if (low.length)  parts.push(`Low levels of ${low.map(d => d.name.toLowerCase()).join(', ')}.`);

  // Valence / arousal
  if (track.valence != null && track.arousal != null) {
    const vWord = track.valence > 0.3 ? 'positive' : track.valence < -0.3 ? 'melancholic' : 'neutral';
    const aWord = track.arousal > 0.3 ? 'energetic' : track.arousal < -0.3 ? 'calm' : 'moderate energy';
    parts.push(`Overall mood: ${vWord}, ${aWord}.`);
  }

  // Genre
  if (track.genre_top) parts.push(`Genre: ${track.genre_top}.`);

  // Use precomputed prompt_fragment if available
  if (track.prompt_fragment) {
    parts.push(track.prompt_fragment);
  }

  // Cursor intent — what the user is dialing toward
  const aKeys = activeKeys(), aLabels = activeLabels();
  const cursorHigh = aKeys.filter(k => cursorValues[k] > 0.7).map(k => (aLabels[k] || k).toLowerCase());
  const cursorLow  = aKeys.filter(k => cursorValues[k] < 0.3).map(k => (aLabels[k] || k).toLowerCase());
  if (cursorHigh.length || cursorLow.length) {
    let intent = 'Target emotional profile:';
    if (cursorHigh.length) intent += ` emphasize ${cursorHigh.join(', ')}`;
    if (cursorLow.length)  intent += `${cursorHigh.length ? ';' : ''} minimize ${cursorLow.join(', ')}`;
    parts.push(intent + '.');
  }

  return parts.join('\n');
}

function openGenOverlay() {
  const overlay = document.getElementById('genOverlay');
  const prompt = document.getElementById('genPrompt');
  const ref = document.getElementById('genRefLabel');
  const status = document.getElementById('genStatus');
  status.textContent = ''; status.className = 'gen-status';
  document.getElementById('genSubmit').disabled = false;

  if (selectedTrack) {
    const name = selectedTrack.title || selectedTrack.filename || `Track ${selectedTrack.id}`;
    ref.textContent = `Reference: ${name}`;
  } else {
    ref.textContent = 'No track selected';
  }
  prompt.value = '';
  overlay.classList.add('open');
  prompt.focus();
}

function closeGenOverlay() {
  document.getElementById('genOverlay').classList.remove('open');
}

async function copyPrompt() {
  const userText = document.getElementById('genPrompt').value.trim();
  const fragment = buildTrackPrompt(selectedTrack);
  const combined = userText ? `${userText}\n\n---\n${fragment}` : fragment;
  if (!combined) return;

  const status = document.getElementById('genStatus');
  try {
    await navigator.clipboard.writeText(combined);
    status.textContent = 'Copied to clipboard!';
    status.className = 'gen-status success';
    setTimeout(() => { status.textContent = ''; }, 2000);
  } catch(e) {
    // Fallback: hidden textarea trick
    const tmp = document.createElement('textarea');
    tmp.value = combined;
    tmp.style.position = 'fixed';
    tmp.style.opacity = '0';
    document.body.appendChild(tmp);
    tmp.select();
    document.execCommand('copy');
    document.body.removeChild(tmp);
    status.textContent = 'Copied!';
    status.className = 'gen-status success';
    setTimeout(() => { status.textContent = ''; }, 2000);
  }
}

function renderDetails(data) {
  const track = data.track || {};
  const name = track.title || track.filename || `Track ${track.id}`;
  document.getElementById('detailsName').textContent = name;
  document.getElementById('detailsMeta').textContent = [track.artist,track.genre_top,track.album].filter(Boolean).join(' · ');
  const scroll = document.getElementById('detailsScroll');
  const audio  = data.audio       || {};
  const emo    = data.emotion     || {};
  const neuro  = data.neuroscience|| {};
  const psycho = data.psychoacoustic || {};
  const harm   = data.harmonic    || {};
  const rhy    = data.rhythm      || {};
  const cplx   = data.complexity  || {};
  const cross  = data.cross_modal || {};

  scroll.innerHTML = [
    mkSec('💎 GEMS 9 Dimensions', renderGems(emo),        !hasData(emo)),
    mkSec('🎵 Core Audio',      renderAudio(audio),      !hasData(audio)),
    mkSec('😊 Emotions',        renderEmotions(emo),     !hasData(emo)),
    mkSec('🧠 Neuroscience',    renderNeuro(neuro),      !hasData(neuro)),
    mkSec('👂 Psychoacoustics', renderPsycho(psycho),    !hasData(psycho)),
    mkSec('🎼 Harmony',         renderHarmony(harm),     !hasData(harm)),
    mkSec('🥁 Rhythm & Groove', renderRhythm(rhy),       !hasData(rhy)),
    mkSec('🔬 Complexity',      renderComplexity(cplx),  !hasData(cplx)),
    mkSec('🎨 Cross-Modal',     renderCrossModal(cross), !hasData(cross)),
  ].join('');
  scroll.querySelectorAll('.section-head').forEach(h => {
    h.addEventListener('click', () => {
      h.nextElementSibling.classList.toggle('open');
      h.querySelector('.section-chevron').classList.toggle('open');
    });
  });
  scroll.querySelectorAll('.section-body').forEach((b,i) => {
    if (i<1) { b.classList.add('open'); b.previousElementSibling.querySelector('.section-chevron').classList.add('open'); }
  });
}

function mkSec(title, content, empty) {
  const body = empty
    ? `<div style="font-size:11px;color:var(--text-muted);padding:6px 0 4px">Not yet analyzed</div>`
    : content;
  return `<div class="section-card">
    <div class="section-head"><span class="section-title">${title}</span><span class="section-chevron">›</span></div>
    <div class="section-body">${body}</div>
  </div>`;
}

function hasData(obj) {
  return obj && Object.keys(obj).length > 0 && Object.values(obj).some(v => v != null);
}

function fr(label, value, tip, bar) {
  const bHtml = bar!=null ? `<div class="feat-bar"><div class="feat-bar-fill" style="width:${Math.round(Math.max(0,Math.min(1,bar))*100)}%"></div></div>` : '';
  return `<div class="feat-row"><span class="feat-label">${label}</span>${bHtml}<span class="feat-value">${value}</span><div class="tip">${tip}</div></div>`;
}

function n(v,d=3) { return v==null?'N/A':Number(v).toFixed(d); }
function n1(v)    { return n(v,1); }
function pct(v)   { return v==null?'N/A':Math.round(v*100)+'%'; }
function esc(s)   { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtTime(s){ if(!isFinite(s)) return '0:00'; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

const GEMS_COLORS = {
  wonder:'#9D4EDD', transcendence:'#7B8EF5', tenderness:'#EF476F', nostalgia:'#FFB347',

};

function renderGems(e) {
  const bars = GEMS_KEYS.map(k => {
    const val = e[k];
    const color = GEMS_COLORS[k] || '#6c63ff';
    return `<div class="emo-bar-row">
      <span class="emo-name" style="color:${color}">${esc(GEMS_LABEL[k])}</span>

      <span class="emo-val">${n(val, 2)}</span>

  }).join('');
  return `<div class="emo-bars" style="margin-top:4px">${bars}</div>`;

function renderAudio(a) {
  return [
    fr('Tempo',`${n1(a.tempo)} BPM`,'Beats per minute — rhythmic pace of the track',null),

    fr('Mood Category',esc(nn.mood_category||'N/A'),'VA quadrant classification',null),
    fr('Sequence Role',esc(nn.sequence_role||'N/A'),'Recommended playlist position',null),
    fr('Sync Potential',n(nn.synchronization_potential),'Ease of group synchronization',nn.synchronization_potential),
    fr('Group Bonding',n(nn.group_bonding_score),'Social cohesion score',nn.group_bonding_score),
  ].join('');
}
function renderPsycho(p) {
  return [
    fr('Perceptual Loudness',`${n1(p.perceptual_loudness)} sone`,'Zwicker loudness in sones',p.perceptual_loudness!=null?Math.min(p.perceptual_loudness/80,1):null),
    fr('Sharpness',n(p.sharpness),'High-frequency harshness in acum',p.sharpness!=null?Math.min(p.sharpness/3,1):null),
    fr('Roughness',n(p.roughness),'Amplitude modulation at ~70Hz',p.roughness!=null?Math.min(p.roughness*5,1):null),
    fr('Fluctuation Strength',n(p.fluctuation_strength),'Slow AM modulation at ~4Hz',p.fluctuation_strength!=null?Math.min(p.fluctuation_strength*4,1):null),
    fr('Sensory Dissonance',n(p.sensory_dissonance),'Beating between close-frequency partials',p.sensory_dissonance),
    fr('Tonality',n(p.tonality),'Tonal vs. noise-like character [0–1]',p.tonality),
    fr('Spectral Brightness',n(p.spectral_brightness),'Overall perceptual brightness',p.spectral_brightness!=null?Math.min(p.spectral_brightness*4,1):null),
  ].join('');
}
function renderHarmony(h) {
  const seq = (()=>{ try { return JSON.parse(h.chord_sequence_json||'[]').slice(0,5).map(c=>c.chord).join(' → '); } catch { return 'N/A'; } })();
  return [
    fr('Chords (first 5)',esc(seq),'First five chords',null),
    fr('Mean Tension',n(h.tonal_tension_mean),'Average harmonic tension',h.tonal_tension_mean),
    fr('Peak Tension',n(h.tonal_tension_max),'Maximum harmonic tension',h.tonal_tension_max),
    fr('Tension Variance',n(h.tonal_tension_std),'Std deviation of tension',h.tonal_tension_std!=null?Math.min(h.tonal_tension_std*5,1):null),
    fr('Harmonic Surprise',n(h.harmonic_surprise_mean),'Mean unexpectedness of chord transitions',h.harmonic_surprise_mean!=null?Math.min(h.harmonic_surprise_mean/5,1):null),
    fr('Key Stability',n(h.key_stability),'How firmly the key center is maintained',h.key_stability),
    fr('Modulation Count',String(h.modulation_count??'N/A'),'Number of key changes',null),
    fr('Cadence Count',String(h.cadence_count??'N/A'),'Number of harmonic resolution points',null),
  ].join('');
}
function renderRhythm(r) {
  const bColors = {delta:'#9D4EDD',theta:'#7B8EF5',alpha:'#00D4AA',beta:'#FFD166',high_beta:'#FF8C42',gamma:'#EF476F'};
  const band = r.entrainment_band||'N/A';
  const bc = bColors[band]||'#8b8fa8';
  return [
    fr('Pulse Clarity',n(r.pulse_clarity),'How easy it is to feel the beat',r.pulse_clarity),
    fr('Beat Strength',n(r.beat_strength),'Prominence of detected beats',r.beat_strength),
    fr('Groove Score',n(r.groove_score),'"Urge to move"',r.groove_score),
    fr('Syncopation',n(r.syncopation),'Off-beat rhythmic emphasis',r.syncopation),
    fr('Danceability',n(r.danceability),'Suitability for dancing',r.danceability),
    fr('Neural Band',`<span style="color:${bc};font-weight:700">${esc(band)}</span>`,'Brainwave band matched by tempo',null),
    '<div class="sub-label">Neural Entrainment Affinities</div>',
    fr('Delta',n(r.delta_affinity),'Deep rest (30–48 BPM)',r.delta_affinity),
    fr('Theta',n(r.theta_affinity),'Meditation (48–96 BPM)',r.theta_affinity),
    fr('Alpha',n(r.alpha_affinity),'Calm focus (60–80 BPM)',r.alpha_affinity),
    fr('Beta',n(r.beta_affinity),'Alertness (120–150 BPM)',r.beta_affinity),
    fr('Gamma',n(r.gamma_affinity),'Cognitive enhancement (40Hz)',r.gamma_affinity),
  ].join('');
}
function renderComplexity(c) {
  return [
    fr('Spectral Entropy',n(c.spectral_entropy),'Energy distribution complexity',c.spectral_entropy!=null?Math.min(c.spectral_entropy,1):null),
    fr('Harmonic Entropy',n(c.harmonic_entropy),'Ambiguity of interval interpretation',c.harmonic_entropy!=null?Math.min(c.harmonic_entropy,1):null),
    fr('Melodic Surprisal',n(c.melodic_surprisal_mean),'How unexpected each note is',c.melodic_surprisal_mean!=null?Math.min(c.melodic_surprisal_mean/4,1):null),
    fr('Rhythmic Surprisal',n(c.rhythmic_surprisal_mean),'Rhythmic predictability',c.rhythmic_surprisal_mean!=null?Math.min(c.rhythmic_surprisal_mean/4,1):null),
    fr('Information Rate',`${n1(c.information_rate)} b/s`,'Bits per second of novel information',c.information_rate!=null?Math.min(c.information_rate/20,1):null),
    fr('Compressibility',n(c.compressibility),'Lempel-Ziv complexity [0=repetitive, 1=complex]',c.compressibility),
    fr('Aesthetic Optimality',n(c.aesthetic_optimality),"Berlyne's inverted-U",c.aesthetic_optimality),
    fr('Predictability',n(c.predictability_score),'Mean probability of next events',c.predictability_score),
  ].join('');
}
function renderCrossModal(cm) {
  const hue = cm.color_hue||0, sat = Math.round((cm.color_saturation||0)*100);
  const bri = Math.round(30+(cm.color_brightness||0.5)*40);
  const swatch = `hsl(${Math.round(hue)},${sat}%,${bri}%)`;
  return [
    `<div class="swatch-row"><div class="color-swatch" style="background:${swatch}"></div><div class="swatch-info">Synesthetic color<br><small style="color:var(--text-muted)">HSL: ${Math.round(hue)}° · ${sat}% · ${bri}%</small></div></div>`,
    fr('Color Hue',`${n(hue,0)}°`,'Spectral centroid → color wheel',hue/360),
    fr('Color Brightness',n(cm.color_brightness),'Pitch height [0–1]',cm.color_brightness),
    fr('Color Saturation',n(cm.color_saturation),'Harmonicity / tonal clarity',cm.color_saturation),
    fr('Texture Roughness',n(cm.texture_roughness),'Spectral roughness → tactile texture',cm.texture_roughness),
    fr('Temperature',n(cm.temperature),'Spectral warmth',cm.temperature),
    fr('Spatial Size',n(cm.spatial_size),'Perceived spatial scale',cm.spatial_size),
    fr('Weight',n(cm.weight),'Low frequency energy → heaviness',cm.weight),
  ].join('');
}

/* ===== INIT + POLLING ===== */
let _lastTrackCount = 0;

function updateCountLabel(n) {
  const el = document.getElementById('trackCountLabel');
  if (el) el.textContent = n > 0 ? `${n.toLocaleString()} tracks` : '';
}

async function loadMap() {
  const data = await fetch('/api/map').then(r => r.json());
  mapData = data;
  _lastTrackCount = data.tracks ? data.tracks.length : 0;
  updateCountLabel(_lastTrackCount);

  // Compute per-dimension min/max and sorted ECDF arrays for all dimensions
  if (data.tracks && data.tracks.length > 0) {
    [...GEMS_KEYS, ...COWEN_KEYS].forEach(k => {
      const vals = data.tracks.map(t => t[k] || 0).sort((a, b) => a - b);
      gemsSorted[k] = vals;
      gemsMin[k] = vals[0];
      gemsMax[k] = vals[vals.length - 1];
    });
  }
  render();
}

async function pollForUpdates() {
  try {
    const { count } = await fetch('/api/track-count').then(r => r.json());
    if (count !== _lastTrackCount) {
      await loadMap();
    }
  } catch(e) { /* ignore */ }
}

async function init() {
  ctx = canvas.getContext('2d');
  try {
    await loadMap();
  } catch(err) {
    console.error('Map load failed:', err);
  }
  setInterval(pollForUpdates, 5000);
}

window.addEventListener('resize', resize);
resize();
init();
</script>
